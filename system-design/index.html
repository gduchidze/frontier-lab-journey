<script>
(function () {
  var KEY = 'course-lang';
  function apply(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-en]').forEach(function (el) {
      el.innerHTML = el.getAttribute(lang === 'ka' ? 'data-ka' : 'data-en');
    });
    document.querySelectorAll('a[data-base]').forEach(function (a) {
      a.href = a.getAttribute('data-base') + (lang === 'ka' ? '.ka.html' : '.html');
    });
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ka').classList.toggle('active', lang === 'ka');
    try { localStorage.setItem(KEY, lang); } catch (e) { /* file:// may block */ }
  }
  document.getElementById('btn-en').addEventListener('click', function () { apply('en'); });
  document.getElementById('btn-ka').addEventListener('click', function () { apply('ka'); });
  var saved = 'en';
  try { saved = localStorage.getItem(KEY) || 'en'; } catch (e) { /* default en */ }
  apply(saved);
})();
</script>
