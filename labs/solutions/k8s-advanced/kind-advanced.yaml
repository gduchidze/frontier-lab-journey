# Lab 11 — advanced cluster: 3 nodes, no default CNI (Cilium installs after),
# edge ports 80/443 + NodePort 30080
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: llm-stack
networking:
  disableDefaultCNI: true      # Cilium replaces kindnet → NetworkPolicy enforced
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
      - containerPort: 443
        hostPort: 443
      - containerPort: 30080
        hostPort: 30080
  - role: worker
  - role: worker               # becomes the fake "GPU" node (llm-stack-worker2)
