# Lab 13 — tenancy guardrails for namespace llm.
# NOTE: size quota to leave headroom for HPA maxReplicas (lab 10).
apiVersion: v1
kind: ResourceQuota
metadata:
  name: llm-quota
  namespace: llm
spec:
  hard:
    requests.cpu: "12"
    requests.memory: 20Gi
    limits.cpu: "16"
    limits.memory: 24Gi
    pods: "10"
    persistentvolumeclaims: "4"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: llm-defaults
  namespace: llm
spec:
  limits:
  - type: Container
    default:               # applied when a container declares no limits
      cpu: "1"
      memory: 1Gi
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    max:                   # no single container may exceed
      cpu: "6"
      memory: 8Gi
