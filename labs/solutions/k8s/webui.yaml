# Lab 08 — Open WebUI on the stack
# WEBUI_AUTH=False is LOCAL-ONLY. Enable auth + TLS before exposing anywhere.
apiVersion: v1
kind: Namespace
metadata:
  name: ui
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: webui-data
  namespace: ui
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ui
  labels: { app: open-webui }
spec:
  replicas: 1
  selector:
    matchLabels: { app: open-webui }
  template:
    metadata:
      labels: { app: open-webui }
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        env:
        - name: OPENAI_API_BASE_URL
          value: "http://vllm-router.llm.svc.cluster.local/v1"
        - name: OPENAI_API_KEY
          value: "not-needed-locally"
        - name: WEBUI_AUTH
          value: "False"
        - name: ENABLE_OLLAMA_API
          value: "False"
        ports:
        - containerPort: 8080
        resources:
          requests: { cpu: 250m, memory: 512Mi }
          limits:   { cpu: "1",  memory: 1Gi }
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: webui-data }
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: ui
spec:
  type: NodePort
  selector: { app: open-webui }
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080      # mapped to Mac:30080 by kind-config extraPortMappings
